name: CI

on:
  push:
    branches: [ "main", "master", "copilot/**" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: PSScriptAnalyzer + Pester
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $existing = Get-Module -Name PSScriptAnalyzer -ListAvailable -ErrorAction SilentlyContinue
          if (-not $existing) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop
          }
          Write-Host "PSScriptAnalyzer version: $((Get-Module PSScriptAnalyzer -ListAvailable | Select-Object -First 1).Version)"

      - name: Install Pester
        shell: pwsh
        run: |
          $existing = Get-Module -Name Pester -ListAvailable -ErrorAction SilentlyContinue |
            Where-Object { $_.Version -ge [version]'5.0.0' }
          if (-not $existing) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
            Install-Module -Name Pester -Scope CurrentUser -Force -MinimumVersion 5.0.0 -ErrorAction Stop
          }
          Write-Host "Pester version: $((Get-Module Pester -ListAvailable | Select-Object -First 1).Version)"

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $settings = Join-Path $env:GITHUB_WORKSPACE 'PSScriptAnalyzerSettings.psd1'
          $paths = @(
            'src',
            'scripts'
          )
          $results = $paths | ForEach-Object {
            Invoke-ScriptAnalyzer -Path (Join-Path $env:GITHUB_WORKSPACE $_) `
              -Settings $settings -Recurse -Severity Error,Warning
          }
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s). See above."
            exit 1
          }
          else {
            Write-Host "PSScriptAnalyzer: no issues found." -ForegroundColor Green
          }

      - name: Run Pester tests
        shell: pwsh
        run: |
          $pesterConfig = New-PesterConfiguration
          $pesterConfig.Run.Path        = Join-Path $env:GITHUB_WORKSPACE 'tests'
          $pesterConfig.Run.Exit        = $true
          $pesterConfig.Output.Verbosity = 'Detailed'
          $pesterConfig.TestResult.Enabled    = $true
          $pesterConfig.TestResult.OutputPath = Join-Path $env:GITHUB_WORKSPACE 'test-results.xml'
          $pesterConfig.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $pesterConfig

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results
          path: test-results.xml
          if-no-files-found: warn
