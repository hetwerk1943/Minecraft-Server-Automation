# Minecraft server properties
# Basic Vanilla Server Configuration
# For 5-10 players, 2GB RAM

#Server
#server-name is not a vanilla property - set your server name in hosting/DNS
server-ip=
server-port=25565
online-mode=true
prevent-proxy-connections=false

#World
level-name=world
level-type=default
level-seed=
generator-settings={}
generate-structures=true
spawn-protection=16
max-world-size=29999984
allow-nether=true

#Players
max-players=10
gamemode=survival
difficulty=normal
hardcore=false
pvp=true
allow-flight=false
spawn-animals=true
spawn-monsters=true
spawn-npcs=true

#Performance
view-distance=10
simulation-distance=10
max-tick-time=60000
network-compression-threshold=256
entity-broadcast-range-percentage=100

#Other
motd=Welcome to my basic Minecraft server!
enable-command-block=false
enable-query=false
enable-rcon=false
white-list=false
enforce-whitelist=false
resource-pack=
resource-pack-sha1=
