# Minecraft server properties
# Production Server Configuration
# For 100-500+ players, 16-32GB RAM
# Enterprise-ready with full monitoring and security

#Server
server-name=Professional Minecraft Network
server-ip=
server-port=25565
online-mode=true
prevent-proxy-connections=true

#World
level-name=world
level-type=default
level-seed=
generator-settings={}
generate-structures=true
spawn-protection=0
max-world-size=10000
allow-nether=true

#Players
max-players=200
gamemode=survival
difficulty=normal
hardcore=false
pvp=true
allow-flight=false
spawn-animals=true
spawn-monsters=true
spawn-npcs=true

#Performance - Heavily Optimized
view-distance=8
simulation-distance=6
max-tick-time=60000
network-compression-threshold=256
entity-broadcast-range-percentage=100

#Economy & Gameplay
enable-command-block=false
function-permission-level=2
op-permission-level=4

#Other
motd=§b§lProfessional Minecraft Network§r\n§7play.yourdomain.com
enable-query=true
query.port=25565
enable-rcon=true
rcon.port=25575
rcon.password=CHANGE_THIS_PASSWORD
white-list=false
enforce-whitelist=false
resource-pack=https://yourdomain.com/resourcepack.zip
resource-pack-sha1=
require-resource-pack=false

#Security - Production Hardened
max-chained-neighbor-updates=1000000
rate-limit=0
player-idle-timeout=30

#Logging
log-ips=true
