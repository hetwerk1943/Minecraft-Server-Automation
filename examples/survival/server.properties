# Minecraft server properties
# Survival Server Configuration
# For 20-50 players, 4-8GB RAM
# With plugins: EssentialsX, LuckPerms, CoreProtect, WorldGuard

#Server
#server-name is not a vanilla property - set your server name in hosting/DNS
server-ip=
server-port=25565
online-mode=true
prevent-proxy-connections=true

#World
level-name=world
level-type=default
level-seed=
generator-settings={}
generate-structures=true
spawn-protection=0
max-world-size=10000
allow-nether=true

#Players
max-players=50
gamemode=survival
difficulty=normal
hardcore=false
pvp=true
allow-flight=false
spawn-animals=true
spawn-monsters=true
spawn-npcs=true

#Performance - Optimized for 50 players
view-distance=8
simulation-distance=8
max-tick-time=60000
network-compression-threshold=256
entity-broadcast-range-percentage=100

#Economy & Gameplay
enable-command-block=false
function-permission-level=2
op-permission-level=4

#Other
motd=§6§lSurvival Server§r\n§7Join the adventure!
enable-query=false
enable-rcon=false
white-list=false
enforce-whitelist=false
resource-pack=
resource-pack-sha1=
require-resource-pack=false

#Security
max-chained-neighbor-updates=1000000
rate-limit=0
